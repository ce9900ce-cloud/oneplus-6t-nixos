name: Build OnePlus 6T NixOS Images

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU binfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-platforms = aarch64-linux

      - name: Set up binary caches
        uses: cachix/cachix-action@v16
        with:
          name: vanilla-mobile-nixos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: nix-community

      - name: Build NixOS system and U-Boot
        run: |
          nix build '.#nixosConfigurations.oneplus-fajita.config.system.build.toplevel'
          nix build '.#nixosConfigurations.oneplus-fajita.config.vanilla-mobile.deviceInfo.uboot'
          mkdir -p output
          cp result/u-boot.img output/
          echo "Build complete"

      - name: Create raw images
        run: |
          # Create boot partition image
          dd if=/dev/zero of=nixos-boot.raw bs=1M count=64 status=progress
          mkfs.vfat -n nixos-boot -S 4096 nixos-boot.raw

          # Create root partition full image  
          dd if=/dev/zero of=nixos-root.raw bs=1M count=6144 status=progress
          ROOT_DEV=$(sudo losetup --find --show nixos-root.raw)
          sudo mkfs.ext4 -L nixos-root "$ROOT_DEV"
          
          # Mount and setup the root filesystem
          sudo mount "$ROOT_DEV" /mnt
          sudo mkdir /mnt/boot
          
          # Copy the system closure
          NIX_ROOT=$(nix path-info '.#nixosConfigurations.oneplus-fajita.config.system.build.toplevel' 2>/dev/null || nix eval --raw '.#nixosConfigurations.oneplus-fajita.config.system.build.toplevel' 2>/dev/null)
          
          # Use nix-store to copy the closure
          NIX_STORE=$(nix eval --raw nixpkgs#legacyPackages.x86_64-linux.stdenv.storeDir 2>/dev/null || echo /nix)
          
          # Build a tarball of the system instead
          nix bundle --bundler '.#nixosConfigurations.oneplus-fajita.config.system.build.toplevel' 2>/dev/null || true
          
          # Dump the store paths
          nix path-info -r '.#nixosConfigurations.oneplus-fajita.config.system.build.toplevel' --closure-size > closure-info.txt
          
          echo "Created image files"
          ls -lh *.raw 2>/dev/null || true
          ls -lh *.txt 2>/dev/null || true

      - name: Upload system build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nixos-sd-image
          path: |
            nixos-boot.raw
            nixos-root.raw
            uboot-fajita/u-boot.img
          retention-days: 7
