name: Build OnePlus 6T NixOS Images

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU binfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-platforms = aarch64-linux

      - name: Set up binary caches
        uses: cachix/cachix-action@v16
        with:
          name: vanilla-mobile-nixos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: nix-community

      - name: Build system closure + U-Boot
        run: |
          nix build '.#nixosConfigurations.oneplus-fajita.config.system.build.toplevel'
          nix build '.#nixosConfigurations.oneplus-fajita.config.vanilla-mobile.deviceInfo.uboot'
          mkdir -p build-output
          cp result/u-boot.img build-output/
          echo "Builds done"

      - name: Build raw disk image
        run: |
          # Create 2GB FAT32 boot image
          dd if=/dev/zero of=nixos-boot.raw bs=1M count=2048 status=progress
          mkfs.vfat -n nixos-boot -S 4096 nixos-boot.raw
          
          # Create 4GB ext4 root image
          dd if=/dev/zero of=nixos-root.raw bs=1M count=4096 status=progress
          ROOT_DEV=$(sudo losetup --find --show nixos-root.raw)
          sudo mkfs.ext4 -L nixos-root "$ROOT_DEV"
          sudo losetup -d "$ROOT_DEV"
          
          mkdir output-images 2>/dev/null || true
          mv nixos-boot.raw nixos-root.raw output-images/
          echo "Images created"

      - name: Upload boot image
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nixos-boot
          path: output-images/nixos-boot.raw
          retention-days: 7

      - name: Upload root image
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nixos-root
          path: output-images/nixos-root.raw
          retention-days: 7

      - name: Upload U-Boot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uboot-fajita
          path: build-output/
          retention-days: 7

      - name: Upload system closure (as tarball)
        run: |
          nix bundle --bundler github:NixOS/bundlers#toTarGZ '.#nixosConfigurations.oneplus-fajita.config.system.build.toplevel' \
            2>/dev/null && mv nixos-*.tar.gz* output-images/ 2>/dev/null || true
          # Fallback: just pack result symlink
          cp -L result/nixos-* output-images/ 2>/dev/null || true
          ls -lh output-images/
