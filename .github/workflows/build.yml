name: Build OnePlus 6T NixOS Images

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU binfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-platforms = aarch64-linux

      - name: Set up binary caches
        uses: cachix/cachix-action@v16
        with:
          name: vanilla-mobile-nixos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: nix-community

      - name: Build NixOS system closure
        run: |
          nix build '.#nixosConfigurations.oneplus-fajita.config.system.build.toplevel'
          echo "System built successfully"

      - name: Create boot image (FAT32)
        run: |
          dd if=/dev/zero of=nixos-boot.raw bs=1M count=2048 status=progress
          mkfs.vfat -n nixos-boot -S 4096 nixos-boot.raw

      - name: Create root image (ext4)
        run: |
          dd if=/dev/zero of=nixos-root.raw bs=1M count=4096 status=progress
          mkfs.ext4 -L nixos-root nixos-root.raw

      - name: Populate images
        run: |
          BOOT_DEV=$(sudo losetup --find --show nixos-boot.raw)
          ROOT_DEV=$(sudo losetup --find --show nixos-root.raw)
          
          sudo mount "$ROOT_DEV" /mnt
          sudo mkdir -p /mnt/boot
          sudo mount "$BOOT_DEV" /mnt/boot
          
          sudo nixos-install --root /mnt \
            --system ./result \
            --no-root-password \
            --no-channel-copy \
            --keep-going \
            --option binary-caches "https://cache.nixos.org"
          
          sudo umount -R /mnt 2>/dev/null || true
          sudo losetup -d "$BOOT_DEV"
          sudo losetup -d "$ROOT_DEV"
          
          mkdir -p output-images
          mv nixos-boot.raw nixos-root.raw output-images/
          echo "Images created successfully"

      - name: Upload U-Boot (prebuilt)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uboot-fajita
          path: uboot-prebuilt/
          retention-days: 7

      - name: Upload disk images
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nixos-images-fajita
          path: output-images/
          retention-days: 7
