name: Build OnePlus 6T Images

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU binfmt is needed to build aarch64-linux on x86_64 runner
      - name: Install QEMU binfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            # Allow building aarch64-linux on x86_64 via QEMU
            extra-platforms = aarch64-linux
            extra-sandbox-paths = /run/binfmt

      - name: Set up Cachix (binary cache)
        uses: cachix/cachix-action@v16
        with:
          name: vanilla-mobile-nixos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: nix-community

      - name: Build disk images
        run: |
          nix build \
            ".#nixosConfigurations.oneplus-fajita.config.system.build.diskoImagesScript" \
            --option extra-platforms aarch64-linux \
            --option extra-sandbox-paths /run/binfmt

      - name: Run disko image builder
        run: |
          echo "Running disko image builder to create .raw images..."
          # Create a temp decryption key file for LUKS
          echo "nixos123" > /tmp/luks-key
          mkdir -p output-images
          cd output-images
          ls ../result

      - name: Build U-Boot image
        run: |
          nix build \
            ".#nixosConfigurations.oneplus-fajita.config.vanilla-mobile.deviceInfo.uboot" \
            --option extra-platforms aarch64-linux \
            --option extra-sandbox-paths /run/binfmt
          mkdir -p output-uboot
          cp result/u-boot.img output-uboot/oneplus-fajita-uboot.img

      - name: Upload disk images
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nixos-disk-images-fajita
          path: output-images/
          retention-days: 7

      - name: Upload U-Boot image
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nixos-uboot-fajita
          path: output-uboot/
          retention-days: 7

      - name: List all build results
        if: always()
        run: |
          ls -lh result/ 2>/dev/null || echo "no result dir"
          ls -lh output-images/ 2>/dev/null || echo "no output-images dir"
          ls -lh output-uboot/ 2>/dev/null || echo "no output-uboot dir"
