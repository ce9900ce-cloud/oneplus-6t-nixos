name: Build OnePlus 6T NixOS Images

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU binfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-platforms = aarch64-linux

      - name: Set up binary caches
        uses: cachix/cachix-action@v16
        with:
          name: vanilla-mobile-nixos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: nix-community

      - name: Build NixOS system closure
        run: |
          nix build '.#nixosConfigurations.oneplus-fajita.config.system.build.toplevel'
          echo "System built successfully"

      - name: Create and populate disk images
        run: |
          # Create boot image (2GB FAT32)
          dd if=/dev/zero of=nixos-boot.raw bs=1M count=2048 status=progress
          BOOT_DEV=$(sudo losetup --find --show nixos-boot.raw)
          sudo mkfs.vfat -n nixos-boot -S 4096 "$BOOT_DEV"

          # Create root image (4GB ext4)
          dd if=/dev/zero of=nixos-root.raw bs=1M count=4096 status=progress
          ROOT_DEV=$(sudo losetup --find --show nixos-root.raw)
          sudo mkfs.ext4 -L nixos-root "$ROOT_DEV"

          # Mount root first, then boot
          sudo mount "$ROOT_DEV" /mnt
          sudo mkdir -p /mnt/boot
          sudo mount "$BOOT_DEV" /mnt/boot

          # Copy NixOS closure to root using nix copy
          # This copies the entire system closure into the ext4 filesystem
          nix copy --to file:///mnt ./result

          # Create minimal fstab for NixOS to find partitions by label
          sudo tee /mnt/etc/fstab > /dev/null << 'EOF'
          /dev/disk/by-label/nixos-root  /       ext4  defaults,noatime  0 1
          /dev/disk/by-label/nixos-boot   /boot   vfat  defaults,noatime  0 2
          EOF

          # Create symlinks for the NixOS system
          sudo mkdir -p /mnt/nix/var/nix/profiles/per-systems
          sudo ln -sf /nix/var/nix/profiles/system /mnt/nix/var/nix/profiles/system-profile
          
          # Sync and unmount
          sync
          sudo umount /mnt/boot
          sudo umount /mnt
          sudo losetup -d "$BOOT_DEV"
          sudo losetup -d "$ROOT_DEV"

          mkdir -p output-images
          mv nixos-boot.raw nixos-root.raw output-images/
          echo "Images created successfully"

      - name: Verify images
        run: |
          ls -lh output-images/
          file output-images/*.raw

      - name: Upload disk images
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nixos-images-fajita
          path: output-images/
          retention-days: 7
