name: Build OnePlus 6T NixOS Images

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU binfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-platforms = aarch64-linux

      - name: Set up binary caches
        uses: cachix/cachix-action@v16
        with:
          name: vanilla-mobile-nixos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: nix-community

      - name: Build NixOS system closure
        run: |
          nix build '.#nixosConfigurations.oneplus-fajita.config.system.build.toplevel'
          echo "System built successfully"

      - name: Create root image and copy system
        run: |
          # Create a single root image (ext4, 6G)
          dd if=/dev/zero of=nixos.img bs=1M count=6144 status=progress
          ROOT_DEV=$(sudo losetup --find --show nixos.img)
          
          sudo mkfs.ext4 -L nixos-root "$ROOT_DEV"
          sudo mount "$ROOT_DEV" /mnt
          sudo mkdir -p /mnt/boot
          
          # Copy the NixOS closure
          nix copy --to /mnt ./result
          
          # Install bootloader
          sudo nixos-install --root /mnt --system ./result --no-root-password --no-channel-copy --keep-going
          
          echo "Install done"
          df -h /mnt
          
          sudo umount -R /mnt 2>/dev/null || true
          sudo losetup -d "$ROOT_DEV" 2>/dev/null || true
          
          mkdir -p output-images
          mv nixos.img output-images/
          echo "Image created successfully"

      - name: Upload U-Boot (prebuilt)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uboot-fajita
          path: uboot-prebuilt/
          retention-days: 7

      - name: Upload disk image
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nixos-image-fajita
          path: output-images/
          retention-days: 7
