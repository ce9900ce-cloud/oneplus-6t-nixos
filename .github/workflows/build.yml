name: Build OnePlus 6T NixOS Images

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU binfmt (for aarch64 cross-compile)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-platforms = aarch64-linux

      - name: Set up binary caches
        uses: cachix/cachix-action@v16
        with:
          name: vanilla-mobile-nixos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: nix-community

      - name: Build U-Boot
        run: |
          nix build ".#nixosConfigurations.oneplus-fajita.config.vanilla-mobile.deviceInfo.uboot"
          mkdir -p output-uboot
          cp result/u-boot.img output-uboot/

      - name: Build NixOS system closure
        run: |
          nix build ".#nixosConfigurations.oneplus-fajita.config.system.build.toplevel"

      - name: Install tools for image creation
        run: |
          sudo apt-get install -y dosfstools

      - name: Create boot image (FAT32)
        run: |
          dd if=/dev/zero of=nixos-boot.raw bs=1M count=2048 status=progress
          mkfs.vfat -n nixos-boot -S 4096 nixos-boot.raw
          mkdir -p /tmp/boot-mnt

      - name: Create root image (ext4)
        run: |
          dd if=/dev/zero of=nixos-root.raw bs=1M count=4096 status=progress
          mkfs.ext4 -L nixos-root nixos-root.raw
          mkdir -p /tmp/root-mnt

      - name: Populate images
        run: |
          # Mount the raw images via loop
          BOOT_DEV=$(sudo losetup --find --show nixos-boot.raw)
          ROOT_DEV=$(sudo losetup --find --show nixos-root.raw)

          sudo mount "$BOOT_DEV" /tmp/boot-mnt
          sudo mount "$ROOT_DEV" /tmp/root-mnt

          # Copy NixOS closure to root using nix copy (more reliable than nixos-install)
          sudo env PATH="$PATH:/nix/var/nix/profiles/default/bin" nix copy --to file:///tmp/root-mnt ./result

          # Create minimal fstab for NixOS to find partitions by label
          sudo mkdir -p /tmp/root-mnt/etc
          sudo tee /tmp/root-mnt/etc/fstab > /dev/null << 'FSTAB'
          /dev/disk/by-label/nixos-root  /       ext4  defaults,noatime  0 1
          /dev/disk/by-label/nixos-boot   /boot   vfat  defaults,noatime  0 2
          FSTAB

          # Copy ESP/boot files
          sudo mkdir -p /tmp/boot-mnt/EFI/BOOT
          sudo cp -r /tmp/root-mnt/boot/* /tmp/boot-mnt/ 2>/dev/null || true

          sudo umount /tmp/boot-mnt
          sudo umount /tmp/root-mnt
          sudo losetup -d "$BOOT_DEV"
          sudo losetup -d "$ROOT_DEV"

          mkdir -p output-images
          mv nixos-boot.raw nixos-root.raw output-images/

      - name: Upload U-Boot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uboot-fajita
          path: output-uboot/
          retention-days: 7

      - name: Upload disk images
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: disk-images-fajita
          path: output-images/
          retention-days: 7

      - name: List build results
        if: always()
        run: |
          echo "=== Build Results ==="
          ls -lh output-uboot/ 2>/dev/null || echo "no output-uboot"
          ls -lh output-images/ 2>/dev/null || echo "no output-images"
