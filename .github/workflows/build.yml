name: Build OnePlus 6T NixOS Images

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU binfmt
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-user-static binfmt-support

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-platforms = aarch64-linux

      - name: Set up binary caches
        uses: cachix/cachix-action@v16
        with:
          name: vanilla-mobile-nixos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: nix-community

      - name: Build system closure + U-Boot
        run: |
          nix build '.#nixosConfigurations.oneplus-fajita.config.system.build.toplevel'
          cp -L result nixos-system-closure
          nix build '.#nixosConfigurations.oneplus-fajita.config.vanilla-mobile.deviceInfo.uboot'
          mkdir -p dist
          cp result/u-boot.img dist/
          echo "Build complete"

      - name: Upload U-Boot
        uses: actions/upload-artifact@v4
        with:
          name: uboot-fajita
          path: dist/
          retention-days: 7

      - name: Upload system closure tarball
        run: |
          tar czf dist/nixos-oneplus6t-closure.tar.gz -C $(nix path-info '.#nixosConfigurations.oneplus-fajita.config.system.build.toplevel') .
          ls -lh dist/

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: nixos-oneplus6t-closure
          path: dist/nixos-oneplus6t-closure.tar.gz
          retention-days: 7
